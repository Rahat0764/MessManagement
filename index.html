<!DOCTYPE html>
<html lang="bn" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>মেস ম্যানেজমেন্ট</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { 
                    fontFamily: { sans: ['"Hind Siliguri"', 'sans-serif'] },
                    colors: { darkBg: '#0b1120', darkCard: '#151e32', darkBorder: '#1e293b' } 
                }
            }
        }
    </script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark .glass-panel { background: rgba(21, 30, 50, 0.85); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .toast-enter { animation: toastIn 0.3s ease-out forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-800 dark:text-slate-100 transition-colors duration-300 flex flex-col h-screen overflow-hidden relative">

    <header class="w-full glass-panel z-40 shrink-0 border-b border-slate-200 dark:border-darkBorder px-4 py-3">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex justify-center items-center shadow-lg text-white">
                    <i data-lucide="home" class="w-6 h-6"></i>
                </div>
                <div><h1 class="text-xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 dark:from-indigo-400 dark:to-purple-400 bg-clip-text text-transparent">মেস ম্যানেজার</h1></div>
            </div>
            <div class="flex items-center gap-3">
                <button id="themeToggle" class="p-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-yellow-400">
                    <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                    <i data-lucide="moon" class="w-5 h-5 block dark:hidden"></i>
                </button>
                <button id="adminBtn" class="flex items-center gap-1 text-sm font-semibold text-indigo-600 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-500/10 px-3 py-1.5 rounded-lg border border-indigo-100 dark:border-indigo-500/20">
                    <i data-lucide="key" class="w-4 h-4"></i> <span id="adminBtnText">এডমিন</span>
                </button>
            </div>
        </div>
    </header>

    <div id="main-scroll-container" class="flex-1 overflow-y-auto w-full pb-32 pt-4 px-4 md:px-6 hide-scrollbar">
        <main id="app-content" class="max-w-5xl mx-auto fade-in"></main>
    </div>

    <nav class="w-full glass-panel z-40 fixed bottom-0 left-0 border-t border-slate-200 dark:border-darkBorder pb-safe">
        <div class="max-w-5xl mx-auto flex justify-around items-center h-16 px-2">
            <button class="nav-btn flex flex-col items-center gap-1 w-[4.5rem] py-1 transition-all duration-300" data-tab="routine"><i data-lucide="calendar-days" class="w-[22px] h-[22px]"></i><span class="text-[10px] font-bold">রুটিন</span></button>
            <button class="nav-btn flex flex-col items-center gap-1 w-[4.5rem] py-1 transition-all duration-300" data-tab="finance"><i data-lucide="users" class="w-[22px] h-[22px]"></i><span class="text-[10px] font-bold">সদস্য</span></button>
            <button class="nav-btn flex flex-col items-center gap-1 w-[4.5rem] py-1 transition-all duration-300" data-tab="expense"><i data-lucide="shopping-cart" class="w-[22px] h-[22px]"></i><span class="text-[10px] font-bold">খরচ</span></button>
            <button class="nav-btn flex flex-col items-center gap-1 w-[4.5rem] py-1 transition-all duration-300" data-tab="overview"><i data-lucide="pie-chart" class="w-[22px] h-[22px]"></i><span class="text-[10px] font-bold">হিসাব</span></button>
        </div>
    </nav>

    <div id="modalContainer" class="fixed inset-0 bg-slate-900/80 dark:bg-black/80 z-50 hidden flex justify-center items-center px-4 backdrop-blur-sm"></div>
    <div id="toast-container" class="fixed top-20 right-4 z-[60] flex flex-col gap-2 pointer-events-none"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/+esm';

        const CONFIG = {
            SUPABASE_URL: "https://qqjfrdjgpjhgrfzhfgay.supabase.co",   
            SUPABASE_KEY: "sb_publishable_PvTlRVCqaorax2qjd-9h-Q_vTWd-ziB", 
            TG_TOKEN:     "8822573911:AAHtJOAmQv92s15G3qBktTt5lfbbY6sgL1Q",
            TG_CHAT_ID:   "8837571965",
            ADMIN_PASS:   "osmankhalu69", 
            MONTHLY_FEE: 5000, 
            REBATE_PER_DAY: 50, 
            MIN_ABSENT_DAYS_FOR_REBATE: 3
        };

        const days = ['রবিবার', 'সোমবার', 'মঙ্গলবার', 'বুধবার', 'বৃহস্পতিবার', 'শুক্রবার', 'শনিবার'];
        let activeTab = 'finance'; 
        let isAdmin = localStorage.getItem('mess_admin_token') === CONFIG.ADMIN_PASS;
        let isDark = true; 

        let supabase = null;
        try { if (CONFIG.SUPABASE_URL && CONFIG.SUPABASE_URL.startsWith('http')) supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY); } 
        catch(e) { console.error("Supabase Error:", e); }

        let data = { routine: [], members: [], expenses: [], logs: [] };
        let bazaarItems = [{name: '', amount: ''}];

        const isCurrentMonth = (dateStr) => {
            if (!dateStr) return false;
            const d = new Date(dateStr);
            return d.getMonth() === new Date().getMonth() && d.getFullYear() === new Date().getFullYear();
        };

        const generateRefId = () => Math.random().toString(36).substr(2, 6).toUpperCase();

        const showToast = (msg, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = type === 'success' ? 'bg-emerald-500' : (type === 'error' ? 'bg-rose-500' : 'bg-indigo-500');
            toast.className = `toast-enter flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg backdrop-blur-md text-white ${colors}`;
            toast.innerHTML = `<i data-lucide="${type==='success'?'check-circle':'alert-circle'}" class="w-5 h-5"></i><span class="text-sm font-semibold">${msg}</span>`;
            container.appendChild(toast); lucide.createIcons();
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = '0.3s'; setTimeout(() => toast.remove(), 300); }, 3000);
        };

        const showCustomAlert = (title, message, isSuccess) => {
            const color = isSuccess ? 'emerald' : 'rose';
            const icon = isSuccess ? 'check-circle' : 'alert-circle';
            showModal(`
                <div class="text-center p-2">
                    <div class="w-16 h-16 bg-${color}-500/10 text-${color}-500 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i data-lucide="${icon}" class="w-8 h-8"></i>
                    </div>
                    <h3 class="font-bold text-xl mb-2 text-slate-800 dark:text-white">${title}</h3>
                    <p class="text-sm text-slate-500 dark:text-slate-400 mb-6">${message}</p>
                    <button id="closeModal" class="w-full py-3 bg-${color}-600 hover:bg-${color}-700 text-white rounded-xl font-bold transition-colors">ঠিক আছে</button>
                </div>
            `);
        };

        const sendTelegramMsg = async (msg, expId = null) => {
            if (!CONFIG.TG_TOKEN || !CONFIG.TG_CHAT_ID || !CONFIG.TG_TOKEN.startsWith('bot') && !CONFIG.TG_TOKEN.includes(':')) return;
            const chatIds = CONFIG.TG_CHAT_ID.split(',');
            const url = `https://api.telegram.org/bot${CONFIG.TG_TOKEN}/sendMessage`;
            const domain = window.location.origin + window.location.pathname;

            for(let id of chatIds) {
                let payload = { chat_id: id.trim(), text: msg, parse_mode: 'HTML' };
                if (expId) {
                    payload.reply_markup = {
                        inline_keyboard: [[
                            { text: "✅ Approve", url: `${domain}?action=approve_exp&id=${expId}&token=${CONFIG.ADMIN_PASS}` },
                            { text: "❌ Reject", url: `${domain}?action=reject_exp&id=${expId}&token=${CONFIG.ADMIN_PASS}` }
                        ]]
                    };
                }
                fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) }).catch(()=>{});
            }
        };

        const logActivity = async (action, details, specificId = null) => {
            const logId = specificId || generateRefId();
            const timestamp = new Date().toLocaleString('bn-BD');
            const newLog = { id: String(Date.now()), log_id: logId, action, details, timestamp };
            
            data.logs.unshift(newLog);
            if (supabase) await supabase.from('activity_logs').insert([newLog]);
            await sendTelegramMsg(`🔔 <b>${action}</b>\n📝 ${details}\n⏰ সময়: ${timestamp}\n🔑 Ref ID: #${logId}`);
            return logId;
        };

        const handleUrlActions = async () => {
            const params = new URLSearchParams(window.location.search);
            const action = params.get('action');
            const id = params.get('id');
            const token = params.get('token');

            if (action && id && token) {
                window.history.replaceState({}, document.title, window.location.pathname);
                setTimeout(async () => {
                    if (token === CONFIG.ADMIN_PASS) {
                        if (action === 'approve_exp') {
                            if (supabase) await supabase.from('expenses').update({ status: 'approved' }).eq('id', id);
                            await logActivity('Expense Approved (Telegram)', `Ref #${id} অনুমোদিত হয়েছে।`, id);
                            showCustomAlert('অ্যাপ্রুভড!', 'খরচটি সফলভাবে ডাটাবেজে অ্যাপ্রুভ করা হয়েছে।', true);
                        } else if (action === 'reject_exp') {
                            if (supabase) await supabase.from('expenses').delete().eq('id', id);
                            await logActivity('Expense Rejected (Telegram)', `Ref #${id} বাতিল করা হয়েছে।`, id);
                            showCustomAlert('বাতিলকৃত!', 'খরচটি ডাটাবেজ থেকে মুছে ফেলা হয়েছে।', false);
                        }
                    } else { showCustomAlert('ভুল পাসওয়ার্ড!', 'এডমিন টোকেন সঠিক নয়। অনুমোদন দেওয়া সম্ভব হয়নি।', false); }
                }, 500);
            }
        };

        const initApp = async () => {
            document.documentElement.classList.add('dark');
            if (isAdmin) document.getElementById('adminBtnText').innerText = 'লগআউট';

            if (!supabase) { showToast('সুপাবেস লিংক ঠিক নেই। কোড চেক করুন!', 'error'); } 
            else {
                try {
                    const [resR, resM, resE, resL] = await Promise.all([
                        supabase.from('routine').select('*').order('id'),
                        supabase.from('members').select('*').order('id'),
                        supabase.from('expenses').select('*').order('date', { ascending: false }),
                        supabase.from('activity_logs').select('*').order('timestamp', { ascending: false }).limit(40)
                    ]);
                    if (resR.data) data.routine = resR.data;
                    if (resM.data) data.members = resM.data;
                    if (resE.data) data.expenses = resE.data;
                    if (resL.data) data.logs = resL.data;
                } catch (err) { showToast('ডাটাবেজ থেকে ডেটা আনতে সমস্যা হচ্ছে!', 'error'); console.log(err); }
            }
            await handleUrlActions();
            render();
        };

        const updateNavUI = () => {
            document.querySelectorAll('.nav-btn').forEach(b => {
                if(b.dataset.tab === activeTab) {
                    b.classList.replace('text-slate-400', 'text-indigo-600');
                    b.classList.replace('dark:text-slate-500', 'dark:text-indigo-400');
                    b.classList.add('bg-indigo-50', 'dark:bg-indigo-500/10', 'rounded-2xl');
                } else {
                    b.classList.replace('text-indigo-600', 'text-slate-400');
                    b.classList.replace('dark:text-indigo-400', 'dark:text-slate-500');
                    b.classList.remove('bg-indigo-50', 'dark:bg-indigo-500/10', 'rounded-2xl');
                }
            });
        };

        const render = () => {
            const content = document.getElementById('app-content');
            if (activeTab === 'routine') content.innerHTML = buildRoutineHTML();
            else if (activeTab === 'finance') content.innerHTML = buildFinanceHTML();
            else if (activeTab === 'expense') content.innerHTML = buildExpenseHTML();
            else if (activeTab === 'overview') content.innerHTML = buildOverviewHTML();
            lucide.createIcons(); attachDynamicListeners(); updateNavUI();
        };

        const buildRoutineHTML = () => {
            const today = days[new Date().getDay()];
            const todayRoutine = data.routine.find(r => r.day === today);
            const currentDayNumber = new Date().getDate();
            const dateStr = new Date().toLocaleDateString('bn-BD', { day: 'numeric', month: 'long', year: 'numeric' });
            let html = '';

            if (currentDayNumber > 10) {
                const isRentPaid = data.expenses.some(e => e.type === 'বাসা ভাড়া' && e.status === 'approved' && isCurrentMonth(e.date));
                const isWifiPaid = data.expenses.some(e => e.type === 'ওয়াইফাই বিল' && e.status === 'approved' && isCurrentMonth(e.date));

                if (!isRentPaid || !isWifiPaid) {
                    html += `<div class="space-y-3 mb-6">`;
                    if (!isRentPaid) html += `<div class="flex items-center gap-3 bg-rose-50 border border-rose-200 text-rose-600 dark:bg-rose-500/10 dark:border-rose-500/20 dark:text-rose-400 p-4 rounded-2xl shadow-sm"><i data-lucide="alert-triangle" class="w-6 h-6 shrink-0"></i><span class="text-sm">আজ মাসের <b>${currentDayNumber} তারিখ</b>, এখনো <b>বাসা ভাড়া</b> দেওয়া হয়নি!</span></div>`;
                    if (!isWifiPaid) html += `<div class="flex items-center gap-3 bg-orange-50 border border-orange-200 text-orange-600 dark:bg-orange-500/10 dark:border-orange-500/20 dark:text-orange-400 p-4 rounded-2xl shadow-sm"><i data-lucide="wifi-off" class="w-6 h-6 shrink-0"></i><span class="text-sm">১০ দিন পার হয়ে গেছে! এখনও <b>ওয়াইফাই বিল</b> পরিশোধ করা হয়নি।</span></div>`;
                    html += `</div>`;
                }
            }

            html += `<div class="mb-4"><p class="text-sm font-bold text-slate-400 dark:text-slate-500 mb-1">${dateStr}</p><h2 class="text-2xl font-bold mb-4">আজকের মেনু</h2></div>`;

            if(todayRoutine) {
                html += `
                <div class="bg-gradient-to-br from-indigo-500 to-purple-600 rounded-3xl p-6 mb-6 shadow-xl text-white relative overflow-hidden">
                    <i data-lucide="chef-hat" class="absolute -right-6 -top-6 w-32 h-32 text-white/10 opacity-50 transform rotate-12"></i>
                    <div class="flex justify-between items-center mb-6 relative z-10">
                        <div><span class="bg-white/20 backdrop-blur-md text-white px-3 py-1.5 rounded-lg text-sm font-bold">${todayRoutine.day}</span></div>
                        ${isAdmin ? `<button class="edit-routine-btn p-2 bg-white/10 hover:bg-white/20 rounded-lg" data-id="${todayRoutine.id}"><i data-lucide="edit-3" class="w-4 h-4"></i></button>` : ''}
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 relative z-10">
                        <div class="bg-white/10 backdrop-blur border border-white/20 p-4 rounded-2xl"><div class="flex items-center gap-2 text-indigo-100 mb-1 font-semibold text-xs"><i data-lucide="sunrise" class="w-4 h-4"></i> সকাল</div><div class="text-lg font-bold">${todayRoutine.b || 'নির্ধারিত নেই'}</div></div>
                        <div class="bg-white/10 backdrop-blur border border-white/20 p-4 rounded-2xl"><div class="flex items-center gap-2 text-indigo-100 mb-1 font-semibold text-xs"><i data-lucide="sun" class="w-4 h-4"></i> দুপুর</div><div class="text-lg font-bold">${todayRoutine.l || 'নির্ধারিত নেই'}</div></div>
                        <div class="bg-white/10 backdrop-blur border border-white/20 p-4 rounded-2xl"><div class="flex items-center gap-2 text-indigo-100 mb-1 font-semibold text-xs"><i data-lucide="moon" class="w-4 h-4"></i> রাত</div><div class="text-lg font-bold">${todayRoutine.d || 'নির্ধারিত নেই'}</div></div>
                    </div>
                </div>`;
            }

            html += `<div class="glass-panel rounded-3xl shadow-sm border border-slate-200 dark:border-darkBorder overflow-hidden">
                <div class="p-5 border-b border-slate-200 dark:border-darkBorder bg-slate-50/50 dark:bg-slate-800/30"><h3 class="font-bold text-lg flex items-center gap-2"><i data-lucide="calendar-days" class="w-5 h-5 text-indigo-500"></i> সাপ্তাহিক বিস্তারিত রুটিন</h3></div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left whitespace-nowrap">
                        <thead><tr class="text-slate-500 border-b border-slate-100 dark:border-darkBorder/50 text-sm"><th class="p-4 font-semibold">বার</th><th class="p-4 font-semibold">সকাল</th><th class="p-4 font-semibold">দুপুর</th><th class="p-4 font-semibold">রাত</th>${isAdmin ? '<th class="p-4 text-right">এডিট</th>' : ''}</tr></thead>
                        <tbody>
                            ${data.routine.length ? data.routine.map(r => `
                                <tr class="border-b border-slate-50 dark:border-darkBorder/30 text-sm ${r.day === today ? 'bg-indigo-50/50 dark:bg-indigo-500/10' : ''}">
                                    <td class="p-4 font-bold text-indigo-600 dark:text-indigo-400">${r.day}</td>
                                    <td class="p-4 text-slate-600 dark:text-slate-300">${r.b || '-'}</td><td class="p-4 text-slate-600 dark:text-slate-300">${r.l || '-'}</td><td class="p-4 text-slate-600 dark:text-slate-300">${r.d || '-'}</td>
                                    ${isAdmin ? `<td class="p-4 text-right"><button class="text-slate-400 hover:text-indigo-500 edit-routine-btn p-2 bg-slate-100 dark:bg-slate-800 rounded-lg" data-id="${r.id}"><i data-lucide="edit-2" class="w-4 h-4"></i></button></td>` : ''}
                                </tr>
                            `).join('') : `<tr><td colspan="5" class="p-8 text-center text-slate-500">ডাটাবেজে রুটিন নেই। ডেটা ইনপুট করুন।</td></tr>`}
                        </tbody>
                    </table>
                </div>
            </div>`;
            return html;
        };

        const buildFinanceHTML = () => {
            let html = `
            <div class="flex justify-between items-center mb-5">
                <h3 class="font-bold text-xl">সদস্যদের হিসাব</h3>
                <div class="flex gap-2">
                    ${isAdmin ? `<button id="addMemberBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow-md"><i data-lucide="plus" class="inline w-3 h-3"></i> সদস্য</button>` : ''}
                    <div class="text-[10px] font-bold text-slate-500 bg-slate-200 dark:bg-slate-800 px-3 py-1.5 rounded-lg border dark:border-slate-700">ফি: ৳${CONFIG.MONTHLY_FEE}</div>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;

            if(data.members.length === 0) html += `<div class="col-span-full p-8 text-center text-slate-500 glass-panel rounded-3xl border border-slate-700">ডাটাবেজ থেকে ডেটা লোড হচ্ছে অথবা সদস্য নেই...</div>`;

            html += data.members.map(m => {
                let absent = m.absentDays || 0;
                let rebate = absent > CONFIG.MIN_ABSENT_DAYS_FOR_REBATE ? absent * CONFIG.REBATE_PER_DAY : 0;
                let mealCost = CONFIG.MONTHLY_FEE - rebate;
                let netBalance = (m.paid || 0) - mealCost - (m.borrowed || 0);
                
                let badgeColor, badgeText, badgeIcon, textColor;
                if (netBalance > 0) { badgeColor = 'bg-emerald-50 dark:bg-emerald-500/10 border-emerald-200 dark:border-emerald-500/20'; textColor = 'text-emerald-600 dark:text-emerald-400'; badgeText = 'বাসা থেকে পাবে'; badgeIcon = 'plus-circle'; }
                else if (netBalance < 0) { badgeColor = 'bg-rose-50 dark:bg-rose-500/10 border-rose-200 dark:border-rose-500/20'; textColor = 'text-rose-600 dark:text-rose-400'; badgeText = 'বাসায় বাকি'; badgeIcon = 'minus-circle'; }
                else { badgeColor = 'bg-slate-50 dark:bg-slate-800/50 border-slate-200 dark:border-slate-700'; textColor = 'text-slate-600 dark:text-slate-400'; badgeText = 'হিসাব ক্লিয়ার'; badgeIcon = 'check-circle-2'; }

                return `
                <div class="glass-panel p-5 rounded-3xl border border-slate-200 dark:border-darkBorder shadow-sm relative overflow-hidden">

        };

        const buildExpenseHTML = () => {
            let itemsHtml = bazaarItems.map((item, idx) => `
                <div class="flex gap-2 mb-2 items-center w-full">
                    <input type="text" placeholder="আইটেম নাম" class="bazaar-name flex-1 min-w-0 p-3 rounded-xl border dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-sm outline-none" value="${item.name}" data-idx="${idx}">
                    <input type="number" placeholder="৳" class="bazaar-amount w-20 flex-shrink-0 p-3 rounded-xl border dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-sm text-center outline-none" value="${item.amount}" data-idx="${idx}">
                    <button class="remove-bazaar-btn text-rose-500 p-3 bg-rose-50 dark:bg-rose-500/10 rounded-xl flex-shrink-0" data-idx="${idx}"><i data-lucide="trash-2" class="w-5 h-5"></i></button>

            return `

            let expenseList = data.expenses.map(e => `

                                <p class="text-[11px] text-slate-400 mt-0.5">${e.date} ${e.shopper ? `• <b>${e.shopper}</b>` : ''}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="text-base font-bold block">৳${e.total}</span>
                            <span class="text-[9px] px-2 py-0.5 rounded-full font-bold ${e.status === 'approved' ? 'bg-emerald-500/20 text-emerald-500' : 'bg-amber-500/20 text-amber-500'}">${e.status === 'approved' ? 'Approved' : 'Pending'}</span>

                    ${e.items && e.items.length > 0 ? `<div class="bg-slate-50 dark:bg-slate-800/50 p-2.5 rounded-xl mt-3 space-y-1.5 border dark:border-slate-700/50">${e.items.map(i=>`<div class="flex justify-between text-[11px]"><span class="text-slate-400">${i.name}</span><span class="font-bold">৳${i.amount}</span></div>`).join('')}</div>` : ''}
                    <div class="flex gap-2 mt-3 pl-11">
                        ${isAdmin && e.status === 'pending' ? `<button class="bg-emerald-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold approve-exp-btn" data-id="${e.id}">অ্যাপ্রুভ</button>` : ''}
                        ${isAdmin ? `<button class="bg-rose-500/10 text-rose-500 px-3 py-1.5 rounded-lg text-xs font-bold del-exp-btn" data-id="${e.id}">মুছুন</button>` : ''}
                    </div>
                </div>
            `).join('') || '<div class="p-8 text-center text-slate-500 text-sm">কোনো খরচের রেকর্ড নেই</div>';

            const depositLogs = data.logs.filter(l => l.action.includes('জমা') || l.action.includes('মাইনাস') || l.action.includes('হিসাব') || l.action.includes('সদস্য'));
            let depositHtml = depositLogs.map(l => `
                <div class="p-4 border-b border-slate-100 dark:border-darkBorder/50 relative hover:bg-slate-800/30 transition-colors">
                    <div class="flex justify-between items-start pr-6">
                        <div class="flex gap-3">
                            <div class="p-2 rounded-xl h-fit bg-indigo-500/10 text-indigo-500"><i data-lucide="piggy-bank" class="w-5 h-5"></i></div>
                            <div>
                                <span class="font-bold text-sm text-slate-200">${l.action}</span>
                                <p class="text-[11px] text-slate-400 mt-1 leading-relaxed">${l.details}</p>
                                <p class="text-[9px] text-slate-500 mt-2"><i data-lucide="clock" class="inline w-3 h-3 pb-0.5"></i> ${l.timestamp}</p>
                            </div>
                        </div>
                    </div>
                    ${isAdmin ? `<button class="delete-log-btn text-rose-500 absolute top-4 right-4 hover:bg-rose-500/20 p-1.5 rounded-lg" data-id="${l.id}"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}
                </div>
            `).join('') || '<div class="p-8 text-center text-slate-500 text-sm">কোনো জমার হিস্ট্রি নেই</div>';

            return `
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="bg-gradient-to-br from-indigo-500 to-blue-600 p-5 rounded-3xl shadow-xl shadow-indigo-500/20 text-white relative overflow-hidden"><i data-lucide="wallet" class="absolute -right-4 -bottom-4 w-28 h-28 text-white/10 transform rotate-12"></i><span class="text-[11px] font-bold block uppercase tracking-wider text-indigo-100 mb-1">মোট ফান্ড কালেকশন</span><h3 class="text-3xl font-bold relative z-10">৳${totalFund}</h3></div>
                <div class="bg-gradient-to-br from-rose-500 to-orange-500 p-5 rounded-3xl shadow-xl shadow-rose-500/20 text-white relative overflow-hidden"><i data-lucide="trending-down" class="absolute -right-4 -bottom-4 w-28 h-28 text-white/10 transform rotate-12"></i><span class="text-[11px] font-bold block uppercase tracking-wider text-rose-100 mb-1">মোট খরচ (Approved)</span><h3 class="text-3xl font-bold relative z-10">৳${totalSpent}</h3></div>
                <div class="bg-gradient-to-br from-emerald-500 to-teal-500 p-5 rounded-3xl shadow-xl shadow-emerald-500/20 text-white relative overflow-hidden"><i data-lucide="piggy-bank" class="absolute -right-4 -bottom-4 w-28 h-28 text-white/10 transform rotate-12"></i><span class="text-[11px] font-bold block uppercase tracking-wider text-emerald-100 mb-1">বর্তমান ব্যালেন্স</span><h3 class="text-3xl font-bold relative z-10">৳${remaining}</h3></div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-4">
                <div class="glass-panel rounded-3xl border border-slate-200 dark:border-darkBorder overflow-hidden flex flex-col h-[500px]">
                    <div class="p-4 border-b border-slate-200 dark:border-darkBorder bg-slate-50/50 dark:bg-slate-800/30"><h3 class="font-bold text-base flex items-center gap-2"><i data-lucide="shopping-cart" class="w-4 h-4 text-orange-500"></i> খরচের হিস্টোরি</h3></div>
                    <div class="overflow-y-auto hide-scrollbar flex-1">${expenseList}</div>
                </div>
                
                <div class="glass-panel rounded-3xl border border-slate-200 dark:border-darkBorder overflow-hidden flex flex-col h-[500px]">
                    <div class="p-4 border-b border-slate-200 dark:border-darkBorder bg-slate-50/50 dark:bg-slate-800/30"><h3 class="font-bold text-base flex items-center gap-2"><i data-lucide="wallet" class="w-4 h-4 text-emerald-500"></i> টাকা জমা ও হিসাবের হিস্ট্রি</h3></div>
                    <div class="overflow-y-auto hide-scrollbar flex-1">${depositHtml}</div>
                </div>
            </div>
            
            ${isAdmin ? `<button id="resetAllBtn" class="w-full mt-4 py-4 bg-rose-500/10 text-rose-500 font-bold rounded-2xl border border-rose-500/30 hover:bg-rose-500/20 transition-colors flex items-center justify-center gap-2"><i data-lucide="alert-triangle" class="w-5 h-5"></i> সম্পূর্ণ হিসাব রিসেট করুন (নতুন মাস)</button>` : ''}
            `;
        };

        const attachDynamicListeners = () => {
            if(activeTab === 'expense') {
                const typeSelect = document.getElementById('expType');
                if(typeSelect) typeSelect.addEventListener('change', (e) => {
                    if(e.target.value === 'বাজার') { document.getElementById('bazaarSection').classList.remove('hidden'); document.getElementById('otherSection').classList.add('hidden'); }
                    else { document.getElementById('bazaarSection').classList.add('hidden'); document.getElementById('otherSection').classList.remove('hidden'); }
                });

                document.getElementById('addBazaarItemBtn')?.addEventListener('click', () => { bazaarItems.push({name: '', amount: ''}); render(); });
                document.querySelectorAll('.bazaar-name').forEach(el => el.addEventListener('input', (e) => bazaarItems[e.target.dataset.idx].name = e.target.value));
                document.querySelectorAll('.bazaar-amount').forEach(el => el.addEventListener('input', (e) => bazaarItems[e.target.dataset.idx].amount = e.target.value));
                document.querySelectorAll('.remove-bazaar-btn').forEach(el => el.addEventListener('click', (e) => { const idx = e.currentTarget.dataset.idx; if(bazaarItems.length > 1) { bazaarItems.splice(idx, 1); render(); } }));

                document.getElementById('submitExpBtn')?.addEventListener('click', async () => {
                    const type = document.getElementById('expType').value;
                    const date = document.getElementById('expDate').value;
                    let total = 0, items = [], shopper = '';

                    if(type === 'বাজার') {
                        shopper = document.getElementById('expShopper').value;
                        if(!shopper) return showToast('বাজারকারীর নাম সিলেক্ট করুন!', 'error');
                        items = bazaarItems.filter(i => i.name && i.amount).map(i => ({name: i.name, amount: Number(i.amount)}));
                        total = items.reduce((sum, i) => sum + i.amount, 0);
                    } else { total = Number(document.getElementById('expTotal').value); }

                    if(total <= 0) return showToast('সঠিক এমাউন্ট দিন!', 'error');

                    const autoApprove = isAdmin ? 'approved' : 'pending';
                    const expId = String(Date.now());
                    const payload = { id: expId, type, date, total, status: autoApprove, items, shopper };
                    
                    if (supabase) await supabase.from('expenses').insert([payload]);
                    data.expenses.unshift(payload);
                    bazaarItems = [{name: '', amount: ''}]; render();
                    showToast(isAdmin ? 'খরচ সরাসরি অ্যাপ্রুভ হয়েছে!' : 'খরচ সেভ হয়েছে, পেন্ডিং আছে।');
                    
                    const msg = `🔔 <b>নতুন খরচ যুক্ত</b>\n📋 খাত: ${type}\n💰 পরিমাণ: ৳${total}\n${shopper ? `👤 মারফত: ${shopper}\n` : ''}🔑 ID: #${expId.substring(expId.length-5)}`;
                    if (!isAdmin) { await sendTelegramMsg(msg, expId); } else { await sendTelegramMsg(msg + '\n✅ (Admin Auto-Approved)'); }
                    await logActivity('নতুন খরচ যুক্ত', `${type} খাতে ৳${total} এন্ট্রি হয়েছে।`, expId);
                });
            }

            if(activeTab === 'overview') {
                document.querySelectorAll('.approve-exp-btn').forEach(btn => btn.addEventListener('click', async (e) => {
                    const id = e.target.dataset.id;
                    if (supabase) await supabase.from('expenses').update({ status: 'approved' }).eq('id', id);
                    const item = data.expenses.find(x => x.id === id);
                    if(item) { item.status = 'approved'; render(); showToast('অ্যাপ্রুভ করা হয়েছে!'); await logActivity('খরচ অ্যাপ্রুভাল', `${item.type} খাতের ৳${item.total} এন্ট্রি অ্যাপ্রুভ করা হয়েছে।`, id); }
                }));

                document.querySelectorAll('.del-exp-btn').forEach(btn => btn.addEventListener('click', async (e) => {
                    if(confirm('এটি মুছে ফেলতে চান?')) {
                        const id = e.target.dataset.id; const item = data.expenses.find(x => x.id === id);
                        if (supabase) await supabase.from('expenses').delete().eq('id', id);
                        data.expenses = data.expenses.filter(x => x.id !== id); render(); showToast('মুছে ফেলা হয়েছে!', 'error');
                        if(item) await logActivity('খরচ ডিলিট', `${item.type} খাতের ৳${item.total} এন্ট্রি মুছে ফেলা হয়েছে।`, id);
                    }
                }));

                document.querySelectorAll('.delete-log-btn').forEach(btn => btn.addEventListener('click', (e) => {
                    const idToDel = e.currentTarget.dataset.id;
                    showModal(`
                        <h3 class="font-bold text-rose-500 mb-3 text-center">হিস্ট্রি মুছুন</h3>
                        <input type="password" id="delLogPass" class="w-full p-3 bg-slate-800 border border-slate-700 text-center text-sm rounded-xl outline-none" placeholder="এডমিন পাসওয়ার্ড">
                        <div class="flex gap-3 mt-6"><button id="closeModal" class="flex-1 py-3 text-sm bg-slate-800 rounded-xl font-bold">বাতিল</button><button id="confirmDelLog" class="flex-1 py-3 text-sm bg-rose-600 text-white rounded-xl font-bold">মুছুন</button></div>
                    `, async () => {
                        if(document.getElementById('delLogPass').value === CONFIG.ADMIN_PASS) {
                            if(supabase) await supabase.from('activity_logs').delete().eq('id', idToDel);
                            data.logs = data.logs.filter(x => x.id !== idToDel);
                            hideModal(); render(); showToast('হিস্ট্রি ডিলিট হয়েছে!', 'error');
                        } else showToast('ভুল পাসওয়ার্ড!', 'error');
                    });
                }));

                document.getElementById('resetAllBtn')?.addEventListener('click', () => {
                    showModal(`
                        <h3 class="font-bold text-rose-500 text-lg mb-4 border-b border-slate-700 pb-3 text-center">সতর্কতা: রিসেট করুন (ধাপ ১/২)</h3>
                        <p class="text-xs text-slate-400 mb-4 text-center">আপনি কি নিশ্চিত? সবার টাকা এবং খরচের হিসাব ডিলিট হয়ে যাবে। এডমিন পাসওয়ার্ড দিন:</p>
                        <input type="password" id="resetPass1" class="w-full p-3 bg-slate-800 border border-slate-700 text-center text-sm rounded-xl outline-none tracking-widest font-mono" placeholder="এডমিন পাসওয়ার্ড">
                        <div class="flex gap-3 mt-6"><button id="closeModal" class="flex-1 py-3 text-sm bg-slate-800 rounded-xl font-bold">বাতিল</button><button id="btnNextReset" class="flex-1 py-3 text-sm bg-rose-600 text-white rounded-xl font-bold">পরবর্তী ধাপ</button></div>
                    `, () => {
                        if(document.getElementById('resetPass1').value === CONFIG.ADMIN_PASS) {
                            hideModal();
                            setTimeout(() => {
                                showModal(`
                                    <h3 class="font-bold text-rose-500 text-lg mb-4 border-b border-slate-700 pb-3 text-center">চূড়ান্ত কনফার্মেশন (ধাপ ২/২)</h3>
                                    <p class="text-xs text-rose-400 mb-4 text-center">এটি আর পরিবর্তন করা যাবে পশ্চাতে। আবার পাসওয়ার্ড দিন:</p>
                                    <input type="password" id="resetPass2" class="w-full p-3 bg-slate-800 border border-rose-500/50 text-center text-sm rounded-xl outline-none tracking-widest font-mono focus:border-rose-500" placeholder="কনফার্ম পাসওয়ার্ড">
                                    <div class="flex gap-3 mt-6"><button id="closeModal" class="flex-1 py-3 text-sm bg-slate-800 rounded-xl font-bold">বাতিল</button><button id="btnFinalReset" class="flex-1 py-3 text-sm bg-rose-600 text-white rounded-xl font-bold shadow-lg shadow-rose-500/30">সব মুছে ফেলুন</button></div>
                                `, async () => {
                                    if(document.getElementById('resetPass2').value === CONFIG.ADMIN_PASS) {
                                        if(supabase) {
                                            await supabase.from('expenses').delete().neq('id', '0'); 
                                            for(let m of data.members) { await supabase.from('members').update({paid:0, borrowed:0, absentDays:0}).eq('id', m.id); }
                                        }
                                        data.expenses = [];
                                        data.members.forEach(m => { m.paid=0; m.borrowed=0; m.absentDays=0; });
                                        hideModal(); render(); showToast('সব হিসাব রিসেট করা হয়েছে!', 'success');
                                        await logActivity('সিস্টেম রিসেট', 'এডমিন দ্বারা নতুন মাসের জন্য সমস্ত হিসাব জিরো (0) করা হয়েছে।');
                                    } else showToast('ভুল পাসওয়ার্ড!', 'error');
                                });
                                document.getElementById('btnFinalReset')?.addEventListener('click', window._modalSaveCallback);
                            }, 200);
                        } else showToast('ভুল পাসওয়ার্ড!', 'error');
                    });
                    document.getElementById('btnNextReset')?.addEventListener('click', window._modalSaveCallback);
                });
            }

            document.querySelectorAll('.edit-routine-btn').forEach(btn => btn.addEventListener('click', (e) => {
                const r = data.routine.find(x => x.id === e.currentTarget.dataset.id);
                if(!r) return;
                showModal(`
                    <h3 class="font-bold text-lg mb-4 border-b border-slate-700 pb-3">রুটিন আপডেট: <span class="text-indigo-500">${r.day}</span></h3>
                    <div class="space-y-4">
                        <div><label class="text-xs font-bold text-slate-500 mb-1 block">সকাল</label><input type="text" id="er-b" value="${r.b || ''}" class="w-full p-3 bg-slate-800 border border-slate-700 text-sm rounded-xl outline-none"></div>
                        <div><label class="text-xs font-bold text-slate-500 mb-1 block">দুপুর</label><input type="text" id="er-l" value="${r.l || ''}" class="w-full p-3 bg-slate-800 border border-slate-700 text-sm rounded-xl outline-none"></div>
                        <div><label class="text-xs font-bold text-slate-500 mb-1 block">রাত</label><input type="text" id="er-d" value="${r.d || ''}" class="w-full p-3 bg-slate-800 border border-slate-700 text-sm rounded-xl outline-none"></div>
                    </div>
                    <div class="flex gap-3 mt-6"><button id="closeModal" class="flex-1 py-3 text-sm bg-slate-800 rounded-xl font-bold">বাতিল</button><button id="saveRoutine" class="flex-1 py-3 text-sm bg-indigo-600 text-white rounded-xl font-bold">সেভ</button></div>
                `, async () => {
                    const updated = { b: document.getElementById('er-b').value, l: document.getElementById('er-l').value, d: document.getElementById('er-d').value };
                    if (supabase) { const { error } = await supabase.from('routine').update(updated).eq('id', r.id); if (error) return showToast('Supabase Error', 'error'); }
                    Object.assign(r, updated); hideModal(); render(); showToast('রুটিন আপডেট হয়েছে!');
                    await logActivity('রুটিন আপডেট', `${r.day} বারের খাবারের মেনু পরিবর্তন করা হয়েছে।`);
                });
            }));

            document.querySelectorAll('.edit-member-btn').forEach(btn => btn.addEventListener('click', (e) => {
                const m = data.members.find(x => x.id === e.currentTarget.dataset.id);
                if(!m) return;
                showModal(`
                    <h3 class="font-bold text-lg mb-4 border-b border-slate-700 pb-3"><span class="text-indigo-500">${m.name}</span> এর হিসাব</h3>
                    <div class="space-y-4">
                        <div><label class="text-xs font-bold text-slate-500 mb-1 block">মোট জমা (৳)</label><input type="number" id="em-p" value="${m.paid || 0}" class="w-full p-3 bg-slate-800 border border-slate-700 text-sm rounded-xl outline-none"></div>
                        <div><label class="text-xs font-bold text-slate-500 mb-1 block">মাইনাস/ধার (৳)</label><input type="number" id="em-b" value="${m.borrowed || 0}" class="w-full p-3 bg-slate-800 border border-slate-700 text-sm rounded-xl outline-none"></div>
                        <div><label class="text-xs font-bold text-slate-500 mb-1 flex justify-between"><span>বন্ধ থাকা দিন</span> <span class="text-[10px] bg-indigo-100 text-indigo-600 px-2 rounded">রিবেটের জন্য</span></label><input type="number" id="em-a" value="${m.absentDays || 0}" class="w-full p-3 bg-slate-800 border border-slate-700 text-sm rounded-xl outline-none"></div>
                    </div>
                    <div class="flex gap-3 mt-6"><button id="closeModal" class="flex-1 py-3 text-sm bg-slate-800 rounded-xl font-bold">বাতিল</button><button id="saveMember" class="flex-1 py-3 text-sm bg-indigo-600 text-white rounded-xl font-bold">আপডেট করুন</button></div>
                `, async () => {
                    const newPaid = Number(document.getElementById('em-p').value);
                    const oldPaid = m.paid || 0;
                    const updated = { paid: newPaid, borrowed: Number(document.getElementById('em-b').value), absentDays: Number(document.getElementById('em-a').value) };
                    
                    if (supabase) { const { error } = await supabase.from('members').update(updated).eq('id', m.id); if (error) return showToast('Supabase Error', 'error'); }
                    Object.assign(m, updated); hideModal(); render(); showToast('হিসাব ডাটাবেজে সেভ হয়েছে!');
                    
                    if (newPaid > oldPaid) await logActivity('টাকা জমা', `${m.name} নতুন করে ৳${newPaid - oldPaid} জমা দিয়েছে। (মোট: ৳${newPaid})`);
                    else if (newPaid < oldPaid) await logActivity('হিসাব মাইনাস', `${m.name} এর জমা থেকে ৳${oldPaid - newPaid} কমানো হয়েছে।`);
                    else await logActivity('সদস্য হিসাব আপডেট', `${m.name} এর প্রোফাইল আপডেট করা হয়েছে।`);
                });
            }));

            document.getElementById('addMemberBtn')?.addEventListener('click', () => {
                showModal(`
                    <h3 class="font-bold text-lg mb-4 border-b border-slate-700 pb-3">নতুন সদস্য যোগ করুন</h3>
                    <div><label class="text-xs font-bold text-slate-500 mb-1 block">সদস্যের নাম</label><input type="text" id="new-m-name" class="w-full p-3 bg-slate-800 border border-slate-700 text-sm rounded-xl outline-none"></div>
                    <div class="flex gap-3 mt-6"><button id="closeModal" class="flex-1 py-3 text-sm bg-slate-800 rounded-xl font-bold">বাতিল</button><button id="saveNewMember" class="flex-1 py-3 text-sm bg-indigo-600 text-white rounded-xl font-bold">যোগ করুন</button></div>
                `, async () => {
                    const name = document.getElementById('new-m-name').value;
                    if(!name) return showToast('নাম ফাঁকা রাখা যাবে না!', 'error');
                    const newId = String(Date.now());
                    const newM = { id: newId, name, paid: 0, borrowed: 0, absentDays: 0 };
                    if (supabase) { const { error } = await supabase.from('members').insert([newM]); if (error) return showToast('Error', 'error'); }
                    data.members.push(newM); hideModal(); render(); showToast('ডাটাবেজে নতুন সদস্য যোগ হয়েছে!');
                    await logActivity('নতুন সদস্য', `সিস্টেমে ${name} কে নতুন সদস্য হিসেবে যুক্ত করা হয়েছে।`);
                });
                document.getElementById('saveNewMember')?.addEventListener('click', window._modalSaveCallback);
            });
        };

        const showModal = (content, onSave) => {
            const mc = document.getElementById('modalContainer');
            mc.innerHTML = `<div class="bg-darkCard w-full max-w-sm rounded-3xl p-6 border border-darkBorder fade-in shadow-2xl">${content}</div>`;
            mc.classList.remove('hidden');
            document.getElementById('closeModal')?.addEventListener('click', hideModal);
            if(onSave) {
                window._modalSaveCallback = onSave;
                document.getElementById('saveRoutine')?.addEventListener('click', onSave);
                document.getElementById('saveMember')?.addEventListener('click', onSave);
                document.getElementById('checkPass')?.addEventListener('click', onSave);
            }
            lucide.createIcons();
        };
        const hideModal = () => document.getElementById('modalContainer').classList.add('hidden');

        document.getElementById('themeToggle').addEventListener('click', () => { isDark = !isDark; document.documentElement.classList.toggle('dark', isDark); });

        document.getElementById('adminBtn').addEventListener('click', () => {
            if(isAdmin) { isAdmin = false; localStorage.removeItem('mess_admin_token'); document.getElementById('adminBtnText').innerText = 'এডমিন'; render(); showToast('লগআউট সফল!'); return; }
            showModal(`
                <div class="text-center mb-5"><div class="w-14 h-14 bg-indigo-500/10 text-indigo-500 rounded-full flex items-center justify-center mx-auto mb-3"><i data-lucide="shield-check" class="w-7 h-7"></i></div><h3 class="font-bold text-xl">এডমিন লগইন</h3></div>
                <input type="password" id="adminPassInput" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 text-sm text-center tracking-widest font-mono outline-none" placeholder="পাসওয়ার্ড দিন">
                <div class="flex gap-3 mt-6"><button id="closeModal" class="flex-1 py-3 text-sm bg-slate-800 rounded-xl font-bold">বাতিল</button><button id="checkPass" class="flex-1 py-3 text-sm bg-indigo-600 text-white rounded-xl font-bold">লগইন</button></div>
            `, () => {
                const inputPass = document.getElementById('adminPassInput').value;
                if(inputPass === CONFIG.ADMIN_PASS) { isAdmin = true; localStorage.setItem('mess_admin_token', inputPass); document.getElementById('adminBtnText').innerText = 'লগআউট'; hideModal(); render(); showToast('লগইন সফল!'); } 
                else showToast('ভুল পাসওয়ার্ড!', 'error');
            });
        });

        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                activeTab = e.currentTarget.dataset.tab;
                document.getElementById('app-content').classList.remove('fade-in');
                void document.getElementById('app-content').offsetWidth;
                document.getElementById('app-content').classList.add('fade-in');
                render();
            });
        });

        initApp();
    </script>
</body>
</html>
